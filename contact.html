<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us | Virgé Bistro</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="contact.style.css">
</head>
<body>

  <div class="contact-wrapper">
    <header>
      <nav>
        <a href="../home/index.html" class="btn-home">← Home</a>
      </nav>
      <h1>Contact Us</h1>
      <p class="subtitle">We’d love to hear from you!</p>
    </header>

    <section class="contact-info">
      <div class="info-box">
        <h2>Visit Us</h2>
        <p>Virgé Bistro</p>
        <p>location pending...</p>
        <p>Open daily: 9AM – 9PM</p>
      </div>

      <div class="info-box">
        <h2>Call or Email</h2>
        <p><strong>Phone:</strong> +254 706953882</p>
        <p><strong>Email:</strong> VirgéBistro@gmail.com</p>
      </div>
    </section>

    <section class="form-section">
      <h2>Send us a Message</h2>
      <form>
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Your Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="What’s on your mind?" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>

    <footer>
      <p>Thank you for reaching out to Virgé Bistro 🍴</p>
    </footer>
  </div>

</body>
</html>
